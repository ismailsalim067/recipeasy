{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Create Recipe</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.js"></script>  
        <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.8.16/jquery-ui.js"></script>  
        <link href="http://ajax.googleapis.com/ajax/libs/jqueryui/1.8.16/themes/ui-lightness/jquery-ui.css" rel="stylesheet" type="text/css"/>
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
    </head>

    <body class="bg-light">
        <div class="account-row top-right">
              {% if user.is_authenticated %}
                  <p>Account: {{ user.username }}</p>
                  <a class="buttonStyle" href="{% url 'recipes:logout' %}">Sign Out</a>
              {% else %}
                  <a class="buttonStyle" href="{% url 'recipes:signup' %}">Sign Up</a>
                  <a class="buttonStyle" href="{% url 'recipes:login' %}">Sign In</a>
              {% endif %}
        </div>

        <div class="container mt-3">
            <h2 class="mb-4">Create Recipe</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="row align-items-stretch">
                    <div class="col-md-7">

                        <div class="mb-2">
                            <label for="recipe_name" class="form-label">Recipe Name:</label>
                            <input name="name" type="text" class="form-control" id="recipe_name" placeholder="Enter recipe name">
                        </div>

                        <div class="mb-2">
                            <label for="description" class="form-label">Description:</label>
                            <textarea name="description" class="form-control" id="description" rows="3" placeholder="Write a brief description"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-4 mb-2">
                                <label for="cuisine" class="form-label">Cuisine:</label><br>
                                <select name="cuisine" class="form-select" aria-label="Default select example">
                                    <option value="italian">Italian</option>
                                    <option value="indian">Indian</option>
                                    <option value="mexican">Mexican</option>
                                    <option value="chinese">Chinese</option>
                                    <option value="other">Other</option>
                                </select><br><br>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label for="difficulty" class="form-label">Difficulty:</label>
                                <select name="difficulty" class="form-select" aria-label="Default select example">
                                    <option value="easy">Easy</option>
                                    <option value="medium">Medium</option>
                                    <option value="hard">Hard</option>
                                </select>
                            </div>

                            <div class="col-md-4 mb-2">
                                <label for="cook_time" class="form-label">Cooking Time (minutes):</label>
                                <input name="cooking_time" type="number" class="form-control" id="cook_time" placeholder="e.g. 30">
                            </div>
                        </div>

                        <div class="mb-2">
                            <label for="ingredients" class="form-label">Ingredients:</label>
                            <textarea name="ingredients" class="form-control" id="ingredients" rows="6" placeholder="List ingredients"></textarea>
                        </div>

                        <div class="mb-2">
                            <label for="instructions" class="form-label">Instructions:</label>
                            <textarea name="instructions" class="form-control" id="instructions" rows="6" placeholder="Write step-by-step instructions"></textarea>
                        </div>

                    </div>

                    <div class="col-md-5 d-flex flex-column">
                        <div class="mb-2">
                            <label for="image" class="form-label">Upload Image:</label>
                            <input name="image" type="file" class="form-control" id="image" placeholder="Upload image (optional)">
                        </div>

                        <div class="mb-2">
                            <button type="submit" class="buttonStyle w-100">Create Recipe</button>
                        </div>
                    </div>
                </div>
            </form>

            <div class="home-button">
                <a href="/homepage/" class="buttonStyle">Home</a>
            </div>

        </div>
        <script>
            $( function() {
                var availableTags = [
                    "Apple Crumble",
                    "Avocado Toast",
                    "Banana Bread",
                    "Beef Stew",
                    "Cinnamon Buns",
                    "Chicken Ceasar Salad",
                    "Doughnuts",
                    "Dumplings",
                    "Eclairs",
                    "Egg Benedict",
                    "French Toast",
                    "Fried Rice",
                    "Gingerbread Cookies",
                    "Garlic Bread",
                    "Hot Cross Buns",
                    "Hummus",
                    "Ice Cream",
                    "Italian Meatballs",
                    "Jelly",
                    "Jerk Chicken",
                    "Key Lime Pie",
                    "Kebab",
                    "Lemon Meringue Pie",
                    "Lasagna",
                    "Muffins",
                    "Macaroni and Cheese",
                    "Nougat",
                    "Nachos",
                    "Overnight Oats",
                    "Omelette",
                    "Pancakes",
                    "Pizza",
                    "Quiche",
                    "Quesadillas",
                    "Red Velvet Cake",
                    "Ratatouille",
                    "Scones",
                    "Spaghetti Bolognese",
                    "Tiramisu",
                    "Tacos",
                    "Upside Down Cake",
                    "Udon Noodles",
                    "Victoria Sponge Cake",
                    "Vegetable Stir Fry",
                    "Waffles",
                    "Welsh Rarebit",
                    "Yorkshire Pudding",
                ];
                $( "#recipe_name" ).autocomplete({
                    source: function(request, response) {
                        var term = request.term.toLowerCase();
                        var matches = availableTags.filter(function(item) {
                            return item.toLowerCase().startsWith(term);
                        });
                        response(matches);
                    }
                });
            } );
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
